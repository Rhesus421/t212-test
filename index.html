const FREQ_EXCLUDE = ['mintos','peerberry','première brique','daily dividends','intérêt journalier','obligation mintos','monmouth'];

function shouldExcludeFreq(name) {
  return FREQ_EXCLUDE.some(x => name.toLowerCase().includes(x));
}

function getFrequencyData(dividends) {
  const byAsset = {};
  dividends.forEach(d => {
    if (shouldExcludeFreq(d.name)) return;
    if (!byAsset[d.name]) byAsset[d.name] = {name:d.name, category:d.category, payments:[]};
    const key = d.year * 100 + d.month;
    if (!byAsset[d.name].payments.includes(key)) byAsset[d.name].payments.push(key);
  });

  const now = new Date();
  const results = [];

  Object.values(byAsset).forEach(asset => {
    const payments = asset.payments.sort((a,b)=>a-b);
    if (payments.length < 2) return;

    const gaps = [];
    for (let i = 1; i < payments.length; i++) {
      const prevY = Math.floor(payments[i-1]/100), prevM = payments[i-1]%100;
      const currY = Math.floor(payments[i]/100), currM = payments[i]%100;
      gaps.push((currY - prevY)*12 + (currM - prevM));
    }
    const avgGap = gaps.reduce((s,g)=>s+g,0) / gaps.length;
    const freq = avgGap <= 1.5 ? 1 : avgGap <= 2.5 ? 2 : 3;
    const freqLabel = freq === 1 ? "Mensuel" : freq === 2 ? "Bimestriel" : "Trimestriel";

    const lastKey = payments[payments.length-1];
    const lastY = Math.floor(lastKey/100), lastM = lastKey%100;
    let nextM = lastM + freq, nextY = lastY;
    while (nextM > 12) { nextM -= 12; nextY++; }

    const isPast = nextY < now.getFullYear() || (nextY === now.getFullYear() && nextM < now.getMonth()+1);
    const isCurrent = nextY === now.getFullYear() && nextM === now.getMonth()+1;

    // Get last amount
    const lastPayments = dividends.filter(d => d.name === asset.name && d.year === lastY && d.month === lastM);
    const lastAmount = lastPayments.reduce((s,d)=>s+d.amount,0);

    results.push({
      name: asset.name,
      category: asset.category,
      freqLabel,
      lastY, lastM,
      nextY, nextM,
      isPast,
      isCurrent,
      lastAmount
    });
  });

  return results.sort((a,b) => {
    const aKey = a.nextY*100+a.nextM;
    const bKey = b.nextY*100+b.nextM;
    return aKey - bKey;
  });
}

function fmt(n) { return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0); }
function fmt0(n) { return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n||0); }

function YearlyBars({data, onYearClick}) {
  const totals = YEARS.map(y => data.filter(d=>d.year===y).reduce((s,d)=>s+d.amount,0));
  const max = Math.max(...totals,1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:8,height:100}}>
      {YEARS.map((y,i) => (
        <div key={y} onClick={()=>onYearClick&&onYearClick(y)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:onYearClick?"pointer":"default"}}>
          <div style={{fontSize:7,color:"#00ff87"}}>{totals[i]>0?fmt0(totals[i]):""}</div>
          <div style={{width:"100%",flex:1,display:"flex",alignItems:"flex-end"}}>
            <div style={{width:"100%",height:Math.max(3,(totals[i]/max)*75),background:totals[i]>0?"linear-gradient(180deg,#4ade80cc,#4ade8033)":"#1e2330",borderRadius:"4px 4px 0 0"}} />
          </div>
          <div style={{fontSize:8,color:"#6b7a99"}}>{y}</div>
        </div>
      ))}
    </div>
  );
}

function MonthlyBars({data,year,onMonthClick}) {
  const monthly = Array(12).fill(0);
  data.filter(d=>d.year===year).forEach(d=>{monthly[d.month-1]+=d.amount;});
  const max = Math.max(...monthly,1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:3,height:90}}>
      {monthly.map((v,i) => (
        <div key={i} onClick={()=>onMonthClick&&onMonthClick(year)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:onMonthClick?"pointer":"default"}}>
          {v>0 && <div style={{fontSize:6,color:"#00ff87",whiteSpace:"nowrap"}}>{fmt0(v)}</div>}
          <div style={{width:"100%",flex:1,display:"flex",alignItems:"flex-end"}}>
            <div style={{width:"100%",height:Math.max(3,(v/max)*65),background:v>0?"linear-gradient(180deg,#4ade80cc,#4ade8033)":"#1e2330",borderRadius:"3px 3px 0 0"}} />
          </div>
          <div style={{fontSize:7,color:"#6b7a99"}}>{MONTHS_FR[i][0]}</div>
        </div>
      ))}
    </div>
  );
}

                <div style={{fontSize:9,color:"#6b7a99",letterSpacing:1,marginBottom:6}}>JOUR</div>
                <select value={form.day} onChange={e=>setForm({...form,day:e.target.value})} style={{width:"100%",background:"#080b12",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 12px",color:"#f0f4ff",fontSize:12}}>
                  {Array.from({length:31},(_,i)=><option key={i+1} value={i+1}>{i+1}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:9,color:"#6b7a99",letterSpacing:1,marginBottom:6}}>MOIS</div>
                <select value={form.month} onChange={e=>setForm({...form,month:e.target.value})} style={{width:"100%",background:"#080b12",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 12px",color:"#f0f4ff",fontSize:12}}>
                  {MONTHS_FULL.map((m,i)=><option key={i} value={i+1}>{m}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:9,color:"#6b7a99",letterSpacing:1,marginBottom:6}}>ANNÉE</div>
                <select value={form.year} onChange={e=>setForm({...form,year:e.target.value})} style={{width:"100%",background:"#080b12",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"10px 12px",color:"#f0f4ff",fontSize:12}}>
                  {YEARS.map(y=><option key={y} value={y}>{y}</option>)}
                </select>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setShowForm(false);setEditingDiv(null);}} style={{flex:1,padding:12,borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",background:"transparent",color:"#6b7a99",fontSize:12,cursor:"pointer"}}>Annuler</button>
              <button onClick={addDividend} style={{flex:2,padding:12,borderRadius:10,border:"none",background:"linear-gradient(135deg,#ffd32a,#ffaa00)",color:"#0a0c10",fontSize:12,fontWeight:700,cursor:"pointer"}}>{editingDiv ? "Modifier" : "Enregistrer"}</button>
            </div>
          </div>
        </div>
      )}


      {/* MODAL TRADING 212 IMPORT */}
      {showT212Modal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={()=>{setShowT212Modal(false);setT212ImportStatus("");setT212ApiId("");setT212ApiSecret("");}}>
          <div style={{background:"#0d1220",borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:480,margin:"0 auto",border:"1px solid rgba(96,165,250,0.3)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:6,color:"#60a5fa"}}>📊 Importer depuis Trading 212</div>
            <div style={{fontSize:10,color:"#6b7a99",marginBottom:20}}>Les nouveaux dividendes seront ajoutés automatiquement (doublons ignorés)</div>
            
            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,color:"#6b7a99",letterSpacing:1,marginBottom:6}}>ID DE LA CLÉ API</div>
              <input type="text" placeholder="1556152Z..." value={t212ApiId} onChange={e=>setT212ApiId(e.target.value)} style={{width:"100%",background:"#080b12",border:"1px solid rgba(96,165,250,0.2)",borderRadius:8,padding:"10px 12px",color:"#f0f4ff",fontSize:12}} />
            </div>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:9,color:"#6b7a99",letterSpacing:1,marginBottom:6}}>CLÉ SECRÈTE</div>
              <input type="password" placeholder="Colle ta clé secrète..." value={t212ApiSecret} onChange={e=>setT212ApiSecret(e.target.value)} style={{width:"100%",background:"#080b12",border:"1px solid rgba(96,165,250,0.2)",borderRadius:8,padding:"10px 12px",color:"#f0f4ff",fontSize:12}} />
            </div>
            
            {t212ImportStatus && (
              <div style={{background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:12,marginBottom:16,fontSize:11,color:t212ImportStatus.startsWith("✅")?"#4ade80":t212ImportStatus.startsWith("❌")?"#f87171":"#c8d4f0"}}>
                {t212ImportStatus}
              </div>
            )}
            
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setShowT212Modal(false);setT212ImportStatus("");setT212ApiId("");setT212ApiSecret("");}} style={{flex:1,padding:12,borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",background:"transparent",color:"#6b7a99",fontSize:12,cursor:"pointer"}}>Fermer</button>
              <button onClick={importFromT212} disabled={t212Loading} style={{flex:2,padding:12,borderRadius:10,border:"none",background:t212Loading?"#1e2330":"linear-gradient(135deg,#60a5fa,#3b82f6)",color:t212Loading?"#6b7a99":"#fff",fontSize:12,fontWeight:700,cursor:t212Loading?"not-allowed":"pointer"}}>
                {t212Loading ? "Import en cours..." : "🔄 Importer"}
              </button>
            </div>
          </div>
        </div>
      )}


(<App />, document.getElementById("root"));
</script>
</body>
</html>
