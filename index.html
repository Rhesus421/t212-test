<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading 212 - Test API</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080b12; color:#f0f4ff; font-family:'Courier New',monospace; padding:20px; }
input, button, select { font-family:inherit; }
.card { background:#0d1220; border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:16px; margin-bottom:14px; }
input { width:100%; background:#080b12; border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 12px; color:#f0f4ff; font-size:13px; }
button { width:100%; padding:14px; border-radius:10px; border:none; background:linear-gradient(135deg,#ffd32a,#ffaa00); color:#080b12; font-size:14px; font-weight:700; cursor:pointer; margin-top:10px; }
.label { font-size:9px; color:#6b7a99; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; margin-top:12px; }
.result { background:#0a1a0d; border:1px solid rgba(0,255,135,0.2); border-radius:10px; padding:14px; margin-top:10px; }
.error { background:#1a0a0a; border:1px solid rgba(248,113,113,0.2); border-radius:10px; padding:14px; margin-top:10px; color:#f87171; font-size:11px; }
.item { border-bottom:1px solid rgba(255,255,255,0.05); padding:10px 0; display:flex; justify-content:space-between; }
.item:last-child { border-bottom:none; }
.green { color:#00ff87; }
.yellow { color:#ffd32a; }
.gray { color:#6b7a99; font-size:10px; }
h2 { font-size:16px; margin-bottom:4px; }
h3 { font-size:11px; color:#6b7a99; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }
</style>
</head>
<body>

<div style="margin-bottom:20px;">
  <div style="font-size:10px;color:#ffd32a;letter-spacing:3px;margin-bottom:6px;">◈ TEST API</div>
  <h2>Trading 212</h2>
</div>

<div class="card">
  <div class="label">Clé API Trading 212</div>
  <input type="password" id="apiKey" placeholder="Colle ta clé ici..." />
  
  <div class="label">Période</div>
  <select id="period" style="width:100%;background:#080b12;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:#f0f4ff;font-size:13px;">
    <option value="7">7 derniers jours</option>
    <option value="30">30 derniers jours</option>
    <option value="90">90 derniers jours</option>
    <option value="365" selected>1 an</option>
  </select>

  <button onclick="fetchDividends()">🔍 Tester l'API</button>
</div>

<div id="status"></div>
<div id="results"></div>

<script>
const SUPABASE_URL = "https://yuiyctpvuaynxghjprok.supabase.co";
const SUPABASE_KEY = "sb_publishable_M7HMxrB2D-CEaSHOZhMElA_1m6w1iZT";

async function fetchDividends() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const days = parseInt(document.getElementById('period').value);
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  
  if (!apiKey) {
    statusEl.innerHTML = '<div class="error">⚠️ Entre ta clé API d\'abord</div>';
    return;
  }

  statusEl.innerHTML = '<div class="card" style="color:#6b7a99;font-size:11px;letter-spacing:1px;">CONNEXION EN COURS...</div>';
  resultsEl.innerHTML = '';

  const now = new Date();
  const from = new Date(now - days * 24 * 60 * 60 * 1000);
  const fromStr = from.toISOString().split('.')[0];
  const toStr = now.toISOString().split('.')[0];

  try {
    const response = await fetch(
      `${SUPABASE_URL}/functions/v1/t212-dividends?from=${fromStr}&to=${toStr}`,
      {
        headers: {
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'x-t212-key': apiKey,
        }
      }
    );

    const data = await response.json();

    if (!response.ok) {
      statusEl.innerHTML = `<div class="error">❌ Erreur ${response.status}: ${JSON.stringify(data)}</div>`;
      return;
    }

    const items = data.items || data || [];

    if (!Array.isArray(items) || items.length === 0) {
      statusEl.innerHTML = '<div class="card" style="color:#6b7a99;">Aucun dividende trouvé sur cette période.</div>';
      console.log('Raw response:', data);
      return;
    }

    // Group by ticker
    const byTicker = {};
    let total = 0;
    items.forEach(d => {
      const ticker = d.ticker || d.instrument || 'Inconnu';
      const amount = parseFloat(d.amountInEuro || d.amount || 0);
      if (!byTicker[ticker]) byTicker[ticker] = { total: 0, count: 0 };
      byTicker[ticker].total += amount;
      byTicker[ticker].count++;
      total += amount;
    });

    statusEl.innerHTML = `<div class="card"><div class="label">RÉSULTAT</div><div style="font-size:22px;font-weight:700;" class="green">${total.toFixed(2)} €</div><div class="gray">${items.length} dividendes trouvés</div></div>`;

    const sorted = Object.entries(byTicker).sort((a,b) => b[1].total - a[1].total);
    
    let html = '<div class="card"><h3>Par actif</h3>';
    sorted.forEach(([ticker, data]) => {
      html += `<div class="item">
        <div><div style="font-size:12px;">${ticker}</div><div class="gray">${data.count} versement(s)</div></div>
        <div class="yellow" style="font-weight:700;">${data.total.toFixed(2)} €</div>
      </div>`;
    });
    html += '</div>';

    html += '<div class="card"><h3>10 derniers versements</h3>';
    items.slice(0, 10).forEach(d => {
      const date = new Date(d.paidOn || d.date || d.time).toLocaleDateString('fr-FR');
      const amount = parseFloat(d.amountInEuro || d.amount || 0).toFixed(2);
      html += `<div class="item">
        <div><div style="font-size:11px;">${d.ticker || 'Inconnu'}</div><div class="gray">${date}</div></div>
        <div class="green">+${amount} €</div>
      </div>`;
    });
    html += '</div>';

    resultsEl.innerHTML = html;

  } catch(e) {
    statusEl.innerHTML = `<div class="error">❌ Erreur: ${e.message}</div>`;
  }
}
</script>
</body>
</html>
